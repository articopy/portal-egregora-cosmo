version: '3.8'

services:
  db:
    image: postgres:15
    container_name: egregora_db
    restart: always
    environment:
      POSTGRES_USER: egregora_user
      POSTGRES_PASSWORD: egregora_password
      POSTGRES_DB: egregora_cms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: egregora_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://egregora_user:egregora_password@db:5432/egregora_cms
    depends_on:
      - db

volumes:
  pgdata:
